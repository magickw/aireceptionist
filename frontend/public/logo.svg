<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" /> <!-- Indigo-600 -->
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" /> <!-- Cyan-500 -->
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Background Shape: Hexagon representing Structure/Business -->
  <path d="M256 44 L468 150 V362 L256 468 L44 362 V150 Z" 
        fill="url(#grad1)" 
        stroke="white" 
        stroke-width="8"
        stroke-opacity="0.1"/>
  
  <!-- Inner Cutout/Negative Space -->
  <path d="M256 80 L432 168 V344 L256 432 L80 344 V168 Z" 
        fill="#0F172A" /> <!-- Slate-900 (Dark Background) -->

  <!-- Abstract 'R' / Signal Pulse -->
  <g transform="translate(156, 156) scale(0.4)">
    <!-- Vertical Spine (The Back of the R) -->
    <rect x="0" y="0" width="100" height="500" rx="50" fill="url(#grad1)" />
    
    <!-- The Loop (Top of R) -->
    <path d="M100 50 H250 A150 150 0 0 1 250 350 H100 V250 H250 A50 50 0 0 0 250 150 H100 V50 Z" 
          fill="url(#grad1)" />
          
    <!-- The Leg (Bottom of R - Signal Wave style) -->
    <path d="M140 350 L280 500 H420 L280 350 H140 Z" 
          fill="url(#grad1)" 
          opacity="0.8"/>
          
    <!-- Connection Dot / Voice Node -->
    <circle cx="350" cy="200" r="40" fill="#22D3EE" filter="url(#glow)" />
  </g>
</svg>