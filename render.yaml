# Render Configuration for Backend (Python/FastAPI)
# This configures Render to deploy only the backend

services:
  - type: web
    name: receptium
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt && alembic upgrade head"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    runtime: python
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: aireceptionist-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: us-east-1
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: RATE_LIMIT_ENABLED
        value: "false"
      - key: REDIS_URL
        sync: false

databases:
  - name: aireceptionist-db
    databaseName: aireceptionist
    user: aireceptionist
    plan: free
    region: oregon